<ul class="movie-list">
    {% for note in notes %}
    <li>{{ note.filename }}
        <span class="float-right">
            {% if current_user.is_authenticated %}
            <a class="btn" href="{{ url_for('main.reader', note_id=note.id) }}">read</a>
            <a class="btn" href="{{ url_for('main.editor', filename=note.filename) }}">edit</a>
            <a class="btn" href="{{ url_for('main.deleter', filename=note.filename) }}" \
               type="submit" name="delete" value="delete" onclick="return confirm('Are you sure?')">delete</a>
            {% endif %}
        </span>
    </li>
    {% endfor %}
</ul>
<footer>
    <p>{{ saying }}</p>
</footer>
{% endblock %}
